services:
  postgres:
    image: postgres:17
    container_name: mimex-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: mimex
      POSTGRES_USER: mimex
      POSTGRES_PASSWORD: mimex
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mimex -d mimex"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - mimex-postgres-data:/var/lib/postgresql/data

volumes:
  mimex-postgres-data:
