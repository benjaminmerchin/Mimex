name: "Deploy Mimex over SSH"
description: "Atomic-slot deploy of Mimex fronted by Traefik"

inputs:
  host:
    description: "VPS host"
    required: true
  username:
    description: "VPS username"
    required: true
  key:
    description: "SSH private key"
    required: true
  container_name:
    description: "Container name (mimex)"
    required: true
  database_name:
    description: "Dedicated PostgreSQL database name"
    required: true
  runtime_image:
    description: "Mimex Node + ffmpeg runtime image"
    required: true
  registry_username:
    description: "GHCR username"
    required: true
  registry_token:
    description: "GHCR token"
    required: true
  zip_name:
    description: "Uploaded ZIP filename"
    required: true
  traefik_host:
    description: "Traefik Host rule"
    required: true

runs:
  using: "composite"
  steps:
    - name: Deploy
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ inputs.host }}
        username: ${{ inputs.username }}
        key: ${{ inputs.key }}
        command_timeout: 30m
        script: |
          set -e
          CONTAINER="${{ inputs.container_name }}"
          DATABASE_NAME="${{ inputs.database_name }}"
          RUNTIME_IMAGE="${{ inputs.runtime_image }}"
          SLOT_A="${CONTAINER}-release-slot-a"
          SLOT_B="${CONTAINER}-release-slot-b"
          TRAEFIK_HOST="${{ inputs.traefik_host }}"
          ENV_FILE="/home/ubuntu/envs/${CONTAINER}.env"
          DATA_DIR="/home/ubuntu/${CONTAINER}-data"
          SANITIZED_ENV_FILE="/tmp/${CONTAINER}-deploy-env-$$.env"

          get_release_dir() {
            local container="$1"
            docker inspect -f '{{range .Mounts}}{{if eq .Destination "/app"}}{{.Source}}{{end}}{{end}}' "${container}" 2>/dev/null || true
          }

          cleanup() {
            rm -f "${SANITIZED_ENV_FILE}" 2>/dev/null || true
          }
          trap cleanup EXIT

          case "${DATABASE_NAME}" in
            *[!a-zA-Z0-9_]*) echo "ERROR: invalid database name"; exit 1 ;;
          esac

          cd /home/ubuntu
          docker network create traefik 2>/dev/null || true
          docker network create internal-net 2>/dev/null || true

          OLD_RELEASE_DIR=""
          if docker ps -a --format '{{.Names}}' | grep -q "^${CONTAINER}$"; then
            OLD_RELEASE_DIR=$(get_release_dir "${CONTAINER}")
          fi
          case "${OLD_RELEASE_DIR}" in
            "/home/ubuntu/${SLOT_A}") NEW_RELEASE="${SLOT_B}" ;;
            *) NEW_RELEASE="${SLOT_A}" ;;
          esac
          echo "Using release slot ${NEW_RELEASE} (current=${OLD_RELEASE_DIR:-none})"

          sudo apt-get update -qq && sudo apt-get install -yqq unzip curl
          sudo rm -rf "${NEW_RELEASE}"
          UNZIP_RC=0
          sudo unzip -o "${{ inputs.zip_name }}" -d "${NEW_RELEASE}" || UNZIP_RC=$?
          if [ "${UNZIP_RC}" -gt 1 ]; then
            echo "ERROR: unzip failed with rc=${UNZIP_RC}"
            exit "${UNZIP_RC}"
          fi
          sudo rm -f "${{ inputs.zip_name }}"
          sudo chown -R "$USER:$USER" "${NEW_RELEASE}"

          if [ ! -f "${ENV_FILE}" ]; then
            echo "ERROR: missing env file ${ENV_FILE}"
            echo "Create it with DATABASE_URL, OPENAI_API_KEY, BETTER_AUTH_SECRET, BETTER_AUTH_URL, and RESEND_API_KEY"
            exit 1
          fi
          cp "${ENV_FILE}" "${SANITIZED_ENV_FILE}"
          sed -i -E 's/^([A-Za-z_][A-Za-z0-9_]*)="(.*)"$/\1=\2/' "${SANITIZED_ENV_FILE}"
          sed -i -E "s/^([A-Za-z_][A-Za-z0-9_]*)='(.*)'$/\\1=\\2/" "${SANITIZED_ENV_FILE}"

          echo "${{ inputs.registry_token }}" | docker login ghcr.io \
            --username "${{ inputs.registry_username }}" \
            --password-stdin
          docker pull "${RUNTIME_IMAGE}"

          echo "Ensuring dedicated database ${DATABASE_NAME} exists..."
          DB_EXISTS=$(docker exec postgres psql -U postgres -d postgres -Atc \
            "SELECT 1 FROM pg_database WHERE datname = '${DATABASE_NAME}';")
          if [ "${DB_EXISTS}" != "1" ]; then
            docker exec postgres psql -U postgres -d postgres -v ON_ERROR_STOP=1 \
              -c "CREATE DATABASE \"${DATABASE_NAME}\";"
          fi

          docker run --rm \
            --env-file "${SANITIZED_ENV_FILE}" \
            -e "EXPECTED_DATABASE=${DATABASE_NAME}" \
            "${RUNTIME_IMAGE}" \
            node -e '
              const url = new URL(process.env.DATABASE_URL);
              if (url.pathname !== `/${process.env.EXPECTED_DATABASE}`) {
                console.error(`DATABASE_URL must target /${process.env.EXPECTED_DATABASE}`);
                process.exit(1);
              }
            '

          echo "Installing production dependencies and running Prisma migrations..."
          docker run --rm \
            --network internal-net \
            -v "$(pwd)/${NEW_RELEASE}:/app" \
            -w /app \
            --env-file "${SANITIZED_ENV_FILE}" \
            "${RUNTIME_IMAGE}" bash -lc '
              set -e
              corepack enable
              pnpm install --prod --frozen-lockfile
              pnpm exec prisma generate
              pnpm exec prisma migrate deploy
              pnpm exec prisma migrate status
            '

          docker rm -f "${CONTAINER}" 2>/dev/null || true
          mkdir -p "${DATA_DIR}"

          echo "Starting container ${CONTAINER}..."
          docker run -d --name "${CONTAINER}" \
            --restart always \
            --network traefik \
            -v "$(pwd)/${NEW_RELEASE}:/app" \
            -v "${DATA_DIR}:/app/data" \
            -w /app \
            --env-file "${SANITIZED_ENV_FILE}" \
            -e "DATA_DIR=/app/data" \
            -e "PORT=3000" \
            -e "NODE_ENV=production" \
            -l "traefik.enable=true" \
            -l "traefik.docker.network=traefik" \
            -l "traefik.http.routers.${CONTAINER}.rule=Host(\`${TRAEFIK_HOST}\`)" \
            -l "traefik.http.routers.${CONTAINER}.tls=true" \
            -l "traefik.http.routers.${CONTAINER}.entrypoints=websecure" \
            -l "traefik.http.routers.${CONTAINER}.tls.certresolver=mytlschallenge" \
            -l "traefik.http.services.${CONTAINER}.loadbalancer.server.port=3000" \
            "${RUNTIME_IMAGE}" node server/dist/index.js

          docker network connect internal-net "${CONTAINER}" 2>/dev/null || true

          echo "Waiting for /healthz readiness..."
          for attempt in $(seq 1 30); do
            if docker exec "${CONTAINER}" node -e \
              "require('http').get('http://127.0.0.1:3000/healthz',res=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1));" \
              2>/dev/null; then
              echo "App is ready."
              break
            fi
            if [ "${attempt}" -eq 30 ]; then
              echo "ERROR: app failed to become ready within 300s"
              docker logs --tail 200 "${CONTAINER}" || true
              exit 1
            fi
            sleep 10
          done

          if [ -n "${OLD_RELEASE_DIR}" ] && [ "${OLD_RELEASE_DIR}" != "/home/ubuntu/${NEW_RELEASE}" ]; then
            sudo rm -rf "${OLD_RELEASE_DIR}" 2>/dev/null || true
          fi

          echo "Deploy complete for ${CONTAINER} (Traefik host: ${TRAEFIK_HOST})"
